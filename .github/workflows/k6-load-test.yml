name: k6 Load Test

on:
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: load-test-${{ github.ref }}
  cancel-in-progress: false

jobs:
  compute-hashes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app_hash: ${{ steps.compute-app.outputs.hash }}
      chopsticks_hash: ${{ steps.compute-chopsticks.outputs.hash }}
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/install-deps

      - name: Compute app image hash
        id: compute-app
        uses: ./.github/actions/compute-app-image-hash

      - name: Compute chopsticks hash
        id: compute-chopsticks
        uses: ./.github/actions/compute-chopsticks-image-hash

  prewarm-compose-images:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/install-docker-compose
      - uses: ./.github/actions/cache-images
        with:
          compose-file: docker/test/integration/docker-compose.yml
      - uses: ./.github/actions/cache-images
        with:
          images: |
            otel/opentelemetry-collector-contrib:0.150.1
            alpine

  run-load-test:
    needs: [compute-hashes, prewarm-compose-images]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/install-apt-packages
        with:
          packages: netcat-traditional gcc g++ make unzip jq bc

      - uses: ./.github/actions/install-deps
      - uses: ./.github/actions/install-docker-compose

      - uses: ./.github/actions/cache-images
        with:
          compose-file: docker/test/integration/docker-compose.yml

      - uses: ./.github/actions/cache-images
        with:
          images: |
            otel/opentelemetry-collector-contrib:0.150.1
            alpine

      - name: Build k6 scripts
        run: corepack pnpm exec turbo build --filter=@identity-backend/load-testing...

      - name: Check for cached e2e images in local daemon
        id: image-check
        run: |
          if docker image inspect \
               identity-backend:e2e-latest \
               identity-backend-startup:e2e-latest \
               chopsticks:e2e-latest >/dev/null 2>&1; then
            echo "all e2e images already in docker daemon, skipping GHCR pull"
            echo "need-fetch=false" >> "$GITHUB_OUTPUT"
          else
            echo "at least one e2e image missing, will pull from GHCR"
            echo "need-fetch=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/login-action@v4
        if: steps.image-check.outputs.need-fetch == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull e2e images from GHCR and retag
        id: pull-images
        if: steps.image-check.outputs.need-fetch == 'true'
        env:
          GHCR_APP_HASH: sha-${{ needs.compute-hashes.outputs.app_hash }}
          GHCR_CHOPSTICKS_HASH: sha-${{ needs.compute-hashes.outputs.chopsticks_hash }}
          GHCR_APP_IDENTITY: ghcr.io/${{ github.repository }}/ci-cache-app-identity:sha-${{ needs.compute-hashes.outputs.app_hash }}
          GHCR_APP_E2E: ghcr.io/${{ github.repository }}/ci-cache-app-e2e:sha-${{ needs.compute-hashes.outputs.app_hash }}
          GHCR_CHOPSTICKS: ghcr.io/${{ github.repository }}/ci-cache-chopsticks:sha-${{ needs.compute-hashes.outputs.chopsticks_hash }}
        run: |
          set -u
          rebuild_app=false
          rebuild_chopsticks=false

          if docker pull "$GHCR_APP_IDENTITY" && docker pull "$GHCR_APP_E2E"; then
            docker tag "$GHCR_APP_IDENTITY" identity-backend:e2e-latest
            docker tag "$GHCR_APP_E2E"      identity-backend-startup:e2e-latest
          else
            echo "::warning::GHCR pull failed for app images — will rebuild locally"
            rebuild_app=true
          fi

          if docker pull "$GHCR_CHOPSTICKS"; then
            docker tag "$GHCR_CHOPSTICKS" chopsticks:e2e-latest
          else
            echo "::warning::GHCR pull failed for chopsticks — will rebuild locally"
            rebuild_chopsticks=true
          fi

          echo "rebuild-app=$rebuild_app" >> "$GITHUB_OUTPUT"
          echo "rebuild-chopsticks=$rebuild_chopsticks" >> "$GITHUB_OUTPUT"

      - name: Rebuild chopsticks locally (GHCR image missing)
        if: steps.pull-images.outputs.rebuild-chopsticks == 'true'
        uses: ./.github/actions/docker-build
        with:
          file: docker/test/e2e/chopsticks.dockerfile
          tags: chopsticks:e2e-latest
          cache-scope: chopsticks-image
          load: "true"
          cache-export: "false"

      - name: Rebuild app images locally (GHCR image missing)
        id: rebuild-app
        if: steps.pull-images.outputs.rebuild-app == 'true'
        uses: ./.github/actions/build-images
        with:
          push: "false"
          version: e2e-fallback
          vcs-ref: ${{ github.sha }}

      - name: Retag rebuilt app images
        if: steps.pull-images.outputs.rebuild-app == 'true'
        run: |
          docker tag "${{ steps.rebuild-app.outputs.app-tag }}" identity-backend:e2e-latest
          docker tag "${{ steps.rebuild-app.outputs.startup-tag }}" identity-backend-startup:e2e-latest

      - name: Start integration services
        run: docker compose -f docker/test/integration/docker-compose.yml up -d
        env:
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1

      - name: Wait for IntegreSQL to be ready
        run: |
          echo "Waiting for IntegreSQL on port 5000..."
          for i in $(seq 1 90); do
            if nc -z localhost 5000; then
              echo "IntegreSQL is ready"
              exit 0
            fi
            echo "Waiting for IntegreSQL to be ready... (${i}s)"
            sleep 1
          done
          echo "::error::IntegreSQL did not become ready within 90s"
          docker compose -f docker/test/integration/docker-compose.yml logs --tail=50 || true
          exit 1

      - name: Create load-test database
        run: |
          docker compose -f docker/test/integration/docker-compose.yml \
            exec -T postgres createdb -U postgres identity_backend || true

      - name: Run database migrations
        # Migrate host-side against the same localhost DB the seed step uses, as
        # scripts/load-test-local.sh does. The web container also runs db:migrate
        # on boot, but over the test-network (postgres-test) — relying on that
        # alone leaves the host-side seed connection without the schema.
        run: pnpm --filter identity-backend-container db:migrate
        env:
          DATABASE_URL: ${{ vars.DATABASE_URL || 'postgres://postgres:password@localhost:5432/identity_backend' }}

      - name: Write e2e env file
        run: bash scripts/write-load-test-env.sh

      - name: Start e2e compose
        run: docker compose -f docker/test/e2e/docker-compose.yml up -d
        env:
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1

      - name: Resolve web host port
        run: |
          endpoint="$(docker compose -f docker/test/e2e/docker-compose.yml port web 8080)"
          [ -n "$endpoint" ] || { echo "::error::could not resolve web host port"; exit 1; }
          port="${endpoint##*:}"
          echo "WEB_PORT=${port}" >> "$GITHUB_ENV"
          echo "resolved web host port: ${port}"

      - name: Wait for web to be ready
        run: |
          echo "Waiting for web on port ${WEB_PORT}..."
          for i in $(seq 1 180); do
            if nc -z localhost "${WEB_PORT}"; then
              echo "Web is ready"
              exit 0
            fi
            echo "Waiting for web to be ready... (${i}s)"
            sleep 1
          done
          echo "::error::Web did not become ready within 180s"
          echo "=== docker ps ==="
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "=== web container logs ==="
          docker compose -f docker/test/e2e/docker-compose.yml logs web --tail=100 || true
          echo ""
          echo "=== chopsticks logs ==="
          docker compose -f docker/test/e2e/docker-compose.yml logs chopsticks_pop_testnet --tail=50 || true
          echo ""
          echo "=== startup container logs ==="
          docker compose -f docker/test/e2e/docker-compose.yml logs e2e-pop-testnet-startup-container --tail=50 || true
          echo ""
          echo "=== integration compose logs ==="
          docker compose -f docker/test/integration/docker-compose.yml logs --tail=30 || true
          exit 1

      - name: Seed test data
        run: |
          pnpm exec tsx apps/identity-backend-load-testing/ts-setup/seed-local-usernames.ts ${SEED_COUNT:-10000}
        env:
          DATABASE_URL: ${{ vars.DATABASE_URL || 'postgres://postgres:password@localhost:5432/identity_backend' }}

      - name: Run k6 load test
        uses: ./.github/actions/run-k6
        with:
          script: apps/identity-backend-load-testing/dist/search.mjs
          base-url: http://localhost:${{ env.WEB_PORT }}
          baseline: apps/identity-backend-load-testing/baselines/search.localhost.json
          seed: "false"
          seed-count: "10000"

      - name: Dump container logs on failure
        if: failure()
        continue-on-error: true
        run: |
          echo "=== still-present containers ==="
          docker ps -a --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.RunningFor}}" || true
          echo ""
          for c in $(docker ps -aq); do
            name=$(docker inspect --format '{{.Name}}' "$c" | sed 's|^/||')
            exit_code=$(docker inspect --format '{{.State.ExitCode}}' "$c")
            finished=$(docker inspect --format '{{.State.FinishedAt}}' "$c")
            echo "======================================================================"
            echo "=== $name  (exit $exit_code, finished $finished)"
            echo "======================================================================"
            docker logs "$c" 2>&1 | tail -120 || true
            echo ""
          done

      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: k6-results-${{ github.run_id }}
          path: /tmp/k6-results/*
          retention-days: 7
          if-no-files-found: warn
