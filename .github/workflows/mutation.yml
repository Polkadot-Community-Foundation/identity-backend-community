name: Mutation Testing

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write
  checks: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      packages: ${{ steps.discover.outputs.packages }}
      package_count: ${{ steps.discover.outputs.package_count }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/install-apt-packages
        with:
          packages: jq
      - id: discover
        run: |
          PACKAGES=$(find . -name "stryker.config.json" -not -path "./node_modules/*" -exec dirname {} \; | sed 's|^\./||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          if [ -z "$PACKAGES" ] || [ "$PACKAGES" = "[]" ]; then
            PACKAGES="[]"
          fi
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"
          echo "package_count=$(echo "$PACKAGES" | jq 'length')" >> "$GITHUB_OUTPUT"
          echo "Discovered packages: $PACKAGES"

  mutation:
    needs: discover
    if: needs.discover.outputs.package_count > 0
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.discover.outputs.packages) }}
    name: Mutation Tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_CONCURRENCY: "100%"
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/install-deps

      # Restore stryker incremental cache from main branch (read-only for PRs)
      - uses: actions/cache/restore@v4
        with:
          path: ${{ matrix.package }}/reports/stryker-incremental.json
          key: ${{ runner.os }}-stryker-${{ matrix.package }}-main
          restore-keys: |
            ${{ runner.os }}-stryker-${{ matrix.package }}-

      - name: Run mutation tests
        run: corepack pnpm turbo mutation --filter=./${{ matrix.package }}

      # Save stryker incremental cache only on main branch
      - uses: actions/cache/save@v4
        if: github.ref == 'refs/heads/main'
        with:
          path: ${{ matrix.package }}/reports/stryker-incremental.json
          key: ${{ runner.os }}-stryker-${{ matrix.package }}-main-${{ github.run_id }}

      - name: Sanitize artifact name
        id: sanitize
        if: always()
        run: echo "name=$(echo '${{ matrix.package }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: mutation-report-${{ steps.sanitize.outputs.name }}-${{ github.run_number }}
          path: ${{ matrix.package }}/reports/*
          retention-days: 1

      - name: Report to summary
        if: github.event_name == 'pull_request' && always()
        run: |
          REPORT="${{ matrix.package }}/reports/mutation-report.json"

          if [ ! -f "$REPORT" ]; then
            echo "::error::Mutation report not found at $REPORT"
            exit 1
          fi

          bun ${{ github.workspace }}/scripts/parse-mutation-report.ts < "$REPORT" > /tmp/stryker-env
          source /tmp/stryker-env

          echo "## Mutation Score: ${SCORE}% (${{ matrix.package }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Killed | ${KILLED} |" >> $GITHUB_STEP_SUMMARY
          echo "| Survived | ${SURVIVED} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timeout | ${TIMEOUT} |" >> $GITHUB_STEP_SUMMARY
          echo "| No Coverage | ${NO_COVERAGE} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Valid** | **${TOTAL_VALID}** |" >> $GITHUB_STEP_SUMMARY

          if [ "$PASSED" = "false" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Below ${THRESHOLD}% threshold" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
