name: Cache Turbo
description: Restore/save the local Turbo build cache keyed by turbo.json + pnpm-lock.yaml

runs:
  using: composite
  steps:
    - uses: actions/cache@v4
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ hashFiles('turbo.json') }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-turbo-${{ hashFiles('turbo.json') }}-
          ${{ runner.os }}-turbo-
