name: Install workspace dependencies
description: |
  Set up the pnpm toolchain, restore the Turbo cache, run frozen-lockfile
  install, then save the populated pnpm store under a run-unique key if
  the exact-lockfile restore was a miss. The save lives here (not in
  setup-pnpm-store) so it runs AFTER pnpm install populates the store —
  saving earlier uploads an empty tarball and pollutes the shared key.

inputs:
  frozen-lockfile:
    description: Pass --frozen-lockfile to pnpm install
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-pnpm-toolchain
    - uses: ./.github/actions/cache-turbo

    - name: Install dependencies
      shell: bash
      run: |
        if [ "${{ inputs.frozen-lockfile }}" = "true" ]; then
          corepack pnpm install --frozen-lockfile
        else
          corepack pnpm install
        fi

    - name: Save pnpm store (only if we populated it)
      if: env.PNPM_STORE_RESTORED != 'true'
      uses: actions/cache/save@v4
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ runner.os }}-pnpm-v2-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.run_id }}-${{ github.run_attempt }}
