receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  file:
    path: /traces/traces.jsonl
    format: json
    rotation:
      max_megabytes: 100
      max_backups: 10

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [file]
