services:
  postgres:
    image: postgres:18
    command: "postgres -c 'shared_buffers=128MB' -c 'fsync=off' -c 'synchronous_commit=off' -c 'full_page_writes=off' -c 'max_connections=400' -c 'client_min_messages=warning'"
    environment:
      POSTGRES_DB: "disable"
      POSTGRES_USER: &PGUSER "postgres"
      POSTGRES_PASSWORD: &PGPASSWORD "password"
      PGSSLMODE: "disable"
    hostname: postgres-test
    ports:
      - "${E2E_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgvolume:/var/lib/postgresql
    networks:
      - test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  integresql:
    image: ghcr.io/allaboutapps/integresql:v1.1.0
    ports:
      - "${E2E_INTEGRESQL_HOST_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: "postgres-test"
      PGUSER: *PGUSER
      PGPASSWORD: *PGPASSWORD
      PGPORT: "5432"
    networks:
      - test-network

volumes:
  pgvolume:

networks:
  test-network:
    name: ${E2E_TEST_NETWORK:-test-network}
    driver: bridge
